name: CI - Petite Maison Epouvante

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Build and test backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/epouvante

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Rendre mvnw executable
        run: chmod +x mvnw

      - name: Compiler et lancer les tests
        run: ./mvnw clean test