name: CI/CD - Petite Maison Epouvante

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-ci-cd:
    name: Build, test, dockerize and scan backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/epouvante

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Rendre mvnw executable
        run: chmod +x mvnw

      - name: Compiler et lancer les tests
        run: ./mvnw clean test

      - name: Creer le package JAR
        run: ./mvnw package -DskipTests

      - name: Construire image Docker
        run: docker build -t epouvante-backend:latest .

      - name: Scanner image Docker avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: epouvante-backend:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Sauvegarder image Docker
        run: docker save epouvante-backend:latest -o epouvante-backend.tar

      - name: Publier image Docker comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: epouvante-backend-docker-image
          path: backend/epouvante/epouvante-backend.tar