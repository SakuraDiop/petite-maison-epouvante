name: CI/CD - Petite Maison Epouvante

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  backend-ci-cd:
    name: Build, test, dockerize, scan and publish
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/epouvante

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Rendre mvnw executable
        run: chmod +x mvnw

      - name: Compiler et lancer les tests
        run: ./mvnw clean test

      - name: Creer le package JAR
        run: ./mvnw package -DskipTests

      - name: Connexion au registre Docker GitHub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Definir le nom de l'image Docker
        run: echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/epouvante-backend:latest" >> $GITHUB_ENV

      - name: Construire image Docker
        run: docker build -t $IMAGE_NAME .

      - name: Scanner image Docker avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Publier image Docker dans GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        run: docker push $IMAGE_NAME